<script>
function hashString(str){
  let hash = 0;
  for(let i=0;i<str.length;i++){
    hash = (hash << 5) - hash + str.charCodeAt(i);
    hash |= 0;
  }
  return Math.abs(hash);
}

function localColor(word){
  const h = hashString(word.toLowerCase().trim());
  const hue = h % 360;
  const sat = 55 + (h % 30);
  const light = 45 + (h % 15);
  const hex = hslToHex(hue, sat, light);
  return { hex, name: word.charAt(0).toUpperCase()+word.slice(1)+" Tone", reason: "No AI generation!" };
}

function hslToHex(h, s, l){
  s /= 100; l /= 100;
  const c = (1 - Math.abs(2*l - 1)) * s;
  const x = c * (1 - Math.abs((h/60) % 2 - 1));
  const m = l - c/2;
  let r=0,g=0,b=0;
  if(h < 60){ r=c; g=x; b=0; }
  else if(h < 120){ r=x; g=c; b=0; }
  else if(h < 180){ r=0; g=c; b=x; }
  else if(h < 240){ r=0; g=x; b=c; }
  else if(h < 300){ r=x; g=0; b=c; }
  else { r=c; g=0; b=x; }
  const toHex = v => Math.round((v+m)*255).toString(16).padStart(2,"0");
  return "#" + toHex(r) + toHex(g) + toHex(b);
}

const PROMPT = w => `Think about the word "${w}" and the first color that genuinely comes to mind for it. Respond ONLY with this JSON, nothing else: {"hex":"#RRGGBB","name":"color name","reason":"short reason why, one sentence, in english"}`;

async function callGroq(word, key, model){
  const res = await fetch("https://api.groq.com/openai/v1/chat/completions",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
    body:JSON.stringify({model:model,messages:[{role:"user",content:PROMPT(word)}]})
  });
  const data = await res.json();
  return data.choices[0].message.content;
}

async function callOpenAI(word, key, model){
  const res = await fetch("https://api.openai.com/v1/chat/completions",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
    body:JSON.stringify({model:model,messages:[{role:"user",content:PROMPT(word)}]})
  });
  const data = await res.json();
  return data.choices[0].message.content;
}

async function callGoogle(word, key, model){
  const res = await fetch("https://generativelanguage.googleapis.com/v1beta/models/"+model+":generateContent?key="+key,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({contents:[{parts:[{text:PROMPT(word)}]}]})
  });
  const data = await res.json();
  return data.candidates[0].content.parts[0].text;
}

async function callAnthropic(word, key, model){
  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:model,max_tokens:1000,messages:[{role:"user",content:PROMPT(word)}]})
  });
  const data = await res.json();
  return data.content.map(c=>c.text||"").join("");
}

async function callOllama(word, model, baseUrl){
  const res = await fetch(baseUrl.replace(/\/$/,"") + "/api/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:model,stream:false,messages:[{role:"user",content:PROMPT(word)}]})
  });
  const data = await res.json();
  return data.message.content;
}

async function callLmStudio(word, model, baseUrl){
  const res = await fetch(baseUrl.replace(/\/$/,"") + "/v1/chat/completions",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:model,messages:[{role:"user",content:PROMPT(word)}]})
  });
  const data = await res.json();
  return data.choices[0].message.content;
}

async function fetchOllamaModels(baseUrl){
  const res = await fetch(baseUrl.replace(/\/$/,"") + "/api/tags");
  const data = await res.json();
  return (data.models||[]).map(m => m.name);
}

async function fetchLmStudioModels(baseUrl){
  const res = await fetch(baseUrl.replace(/\/$/,"") + "/v1/models");
  const data = await res.json();
  return (data.data||[]).map(m => m.id);
}

async function findColor(word){
  const provider = document.getElementById("provider").value;
  const key = document.getElementById("apiKey").value.trim();
  const model = document.getElementById("modelText").value.trim();
  const baseUrl = document.getElementById("baseUrl").value.trim();

  if(provider === "none") return localColor(word);
  if(provider !== "ollama" && provider !== "lmstudio" && !key) return localColor(word);
  if((provider === "ollama" || provider === "lmstudio") && !model) return localColor(word);

  try{
    let raw;
    if(provider === "groq") raw = await callGroq(word, key, model);
    else if(provider === "openai") raw = await callOpenAI(word, key, model);
    else if(provider === "google") raw = await callGoogle(word, key, model);
    else if(provider === "anthropic") raw = await callAnthropic(word, key, model);
    else if(provider === "ollama") raw = await callOllama(word, model, baseUrl || "http://localhost:11434");
    else if(provider === "lmstudio") raw = await callLmStudio(word, model, baseUrl || "http://localhost:1234");
    else raw = null;

    if(!raw) return localColor(word);
    const clean = raw.replace(/```json|```/g,"").trim();
    return JSON.parse(clean);
  }catch(e){
    return localColor(word);
  }
}

function textColorFor(hex){
  const c = hex.replace("#","");
  const r = parseInt(c.substring(0,2),16);
  const g = parseInt(c.substring(2,4),16);
  const b = parseInt(c.substring(4,6),16);
  const lum = (0.299*r + 0.587*g + 0.114*b)/255;
  return lum > 0.55 ? "#111" : "#fff";
}

const DEFAULT_MODELS = {
  groq: "llama-3.3-70b-versatile",
  openai: "gpt-4o-mini",
  google: "gemini-2.0-flash",
  anthropic: "claude-sonnet-5",
  ollama: "llama3",
  lmstudio: "local-model"
};

const DEFAULT_URLS = {
  ollama: "http://localhost:11434",
  lmstudio: "http://localhost:1234"
};

async function fetchModelsForCurrentProvider(){
  const p = providerSel.value;
  if(p !== "ollama" && p !== "lmstudio") return;
  const baseUrl = baseUrlInput.value.trim() || DEFAULT_URLS[p];
  modelSelect.innerHTML = "";
  modelStatus.textContent = "Modeller yükleniyor...";
  try{
    const models = p === "ollama" ? await fetchOllamaModels(baseUrl) : await fetchLmStudioModels(baseUrl);
    if(!models.length){
      modelSelect.style.display = "none";
      modelStatus.textContent = p === "ollama" ? "Model bulunamadı. Terminalde: ollama pull llama3" : "Model bulunamadı. LM Studio'da bir model yükleyip Local Server'ı başlat.";
      return;
    }
    models.forEach(m => {
      const opt = document.createElement("option");
      opt.value = m;
      opt.textContent = m;
      modelSelect.appendChild(opt);
    });
    modelSelect.style.display = "block";
    modelStatus.textContent = models.length + " model bulundu, listeden seçebilirsin.";
    modelSelect.onchange = () => { modelText.value = modelSelect.value; };
    if(!modelText.value) modelText.value = models[0];
    modelSelect.value = modelText.value;
  }catch(e){
    modelSelect.style.display = "none";
    modelStatus.textContent = p === "ollama"
      ? "Bağlanılamadı. Ollama çalışıyor mu? Terminalde 'OLLAMA_ORIGINS=* ollama serve' ile başlatmayı dene, adresi kontrol et."
      : "Bağlanılamadı. LM Studio'da Local Server sekmesinden 'Start Server'a bastın mı, adresi kontrol et.";
  }
}
fetchModelsBtn.addEventListener("click", fetchModelsForCurrentProvider);

function updateFieldsForProvider(){
  const p = providerSel.value;
  const isLocal = p === "ollama" || p === "lmstudio";
  const isNone = p === "none";

  apiKeyLabel.style.display = isLocal || isNone ? "none" : "block";
  apiKeyInput.style.display = isLocal || isNone ? "none" : "block";

  baseUrlLabel.style.display = isLocal ? "block" : "none";
  baseUrlInput.style.display = isLocal ? "block" : "none";
  if(isLocal) baseUrlInput.placeholder = DEFAULT_URLS[p];
  if(isLocal && !baseUrlInput.value) baseUrlInput.value = DEFAULT_URLS[p];

  fetchModelsBtn.style.display = isLocal ? "inline-block" : "none";
  modelSelect.style.display = "none";
  modelSelect.innerHTML = "";
  modelStatus.textContent = "";

  document.getElementById("modelRow").style.display = isNone ? "none" : "flex";
  document.getElementById("modelLabel").style.display = isNone ? "none" : "block";

  if(!isNone){
    modelText.value = DEFAULT_MODELS[p] || "";
    modelText.placeholder = isLocal ? "Getir'e bas veya model adını elle yaz" : "model adı";
  }

}

const settingsBtn = document.getElementById("settingsBtn");

function toggleHistory(open){
  const shouldOpen = open !== undefined ? open : !historyPanel.classList.contains("open");
  historyPanel.classList.toggle("open", shouldOpen);
  historyOverlay.classList.toggle("open", shouldOpen);
  historyBtn.classList.toggle("active", shouldOpen);
}
historyBtn.addEventListener("click", () => toggleHistory());
historyOverlay.addEventListener("click", () => toggleHistory(false));

const HISTORY_MAX = 30;
const HISTORY_KEY = "coloriser_history";
let colorHistory = [];

function loadHistory(){
  try{
    const raw = localStorage.getItem(HISTORY_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      if(Array.isArray(parsed)) colorHistory = parsed.slice(0, HISTORY_MAX);
    }
  }catch(e){
    colorHistory = [];
  }
}

function saveHistory(){
  try{
    localStorage.setItem(HISTORY_KEY, JSON.stringify(colorHistory));
  }catch(e){}
}

function addToHistory(word, r){
  colorHistory.unshift({ word, hex: r.hex, name: r.name });
  if(colorHistory.length > HISTORY_MAX){
    colorHistory = colorHistory.slice(0, HISTORY_MAX);
  }
  saveHistory();
  renderHistory();
}

loadHistory();
renderHistory();

function renderHistory(){
  const list = document.getElementById("historyList");
  if(!colorHistory.length){
    list.innerHTML = '<div class="historyEmpty">Henüz renk üretilmedi.</div>';
    return;
  }
  list.innerHTML = colorHistory.map((h, i) => `
    <div class="historyItem" data-index="${i}">
      <div class="historySwatch" style="background:${h.hex}"></div>
      <div class="historyText">
        <div class="historyWord">${h.word}</div>
        <div class="historyHex">${h.hex.toUpperCase()} · ${h.name}</div>
      </div>
      <button class="historyDelete" data-index="${i}" title="Sil">✕</button>
    </div>
  `).join("");
  list.querySelectorAll(".historyItem").forEach(item => {
    item.addEventListener("click", (e) => {
      if(e.target.classList.contains("historyDelete")) return;
      input.value = colorHistory[Number(item.getAttribute("data-index"))].word;
      run();
    });
  });
  list.querySelectorAll(".historyDelete").forEach(delBtn => {
    delBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      const idx = Number(delBtn.getAttribute("data-index"));
      colorHistory.splice(idx, 1);
      saveHistory();
      renderHistory();
    });
  });
}

async function run(){
  const word = input.value.trim();
  if(!word) return;
  btn.disabled = true;
  box.style.background = "rgba(22,22,29,.8)";
  box.style.borderColor = "#2a2a33";
  box.innerHTML = '<span class="placeholder">thinking...</span>';
  try{
    const r = await findColor(word);
    const tc = textColorFor(r.hex);
    box.style.background = r.hex;
    box.style.borderColor = r.hex;
    box.style.color = tc;
    box.innerHTML = r.name + '<div class="hexline">' + r.hex.toUpperCase() + '</div><div class="reason">' + r.reason + '</div>';
    addToHistory(word, r);
  }catch(e){
    const r = localColor(word);
    const tc = textColorFor(r.hex);
    box.style.background = r.hex;
    box.style.borderColor = r.hex;
    box.style.color = tc;
    box.innerHTML = r.name + '<div class="hexline">' + r.hex.toUpperCase() + '</div><div class="reason">' + r.reason + '</div>';
    addToHistory(word, r);
  }
  btn.disabled = false;
}

btn.onclick = run;
input.addEventListener("keydown", e => { if(e.key === "Enter") run(); });

(function applyUrlParams(){
  const params = new URLSearchParams(window.location.search);
  const mode = params.get("mode");
  const key = params.get("key");
  const model = params.get("model");
  const colorWord = params.get("color_word");

  if(mode){
    const validModes = ["none","groq","openai","google","anthropic","ollama","lmstudio"];
    if(validModes.includes(mode)){
      providerSel.value = mode;
      updateFieldsForProvider();
    }
  }

  if(key) apiKeyInput.value = key;
  if(model) modelText.value = model;

  if(colorWord){
    input.value = colorWord;
    run();
  }
})();

const starLayer = document.getElementById("starLayer");
const STAR_COUNT = 70;
for(let i=0;i<STAR_COUNT;i++){
  const s = document.createElement("div");
  s.className = "star";
  const size = Math.random()*1.6 + 0.6;
  s.style.width = size + "px";
  s.style.height = size + "px";
  s.style.left = Math.random()*100 + "%";
  s.style.top = Math.random()*100 + "%";
  s.style.animationDelay = (Math.random()*4) + "s";
  s.style.animationDuration = (3 + Math.random()*3) + "s";
  starLayer.appendChild(s);
}

const blobEls = Array.from(document.querySelectorAll(".blob"));
const blobConfig = blobEls.map((el, i) => ({
  el,
  driftAmpX: 60 + Math.random()*40,
  driftAmpY: 50 + Math.random()*40,
  driftSpeed: 0.15 + Math.random()*0.12,
  phase: Math.random()*Math.PI*2,
  parallax: 0.05 + i*0.025,
  scaleAmp: 0.08 + Math.random()*0.08
}));

let mouseX = window.innerWidth/2, mouseY = window.innerHeight/2;
let targetX = mouseX, targetY = mouseY;
document.addEventListener("mousemove", e => { targetX = e.clientX; targetY = e.clientY; });

let bt = 0;
function animateBlobs(){
  bt += 0.006;
  mouseX += (targetX - mouseX) * 0.03;
  mouseY += (targetY - mouseY) * 0.03;
  const relX = (mouseX - window.innerWidth/2);
  const relY = (mouseY - window.innerHeight/2);

  blobConfig.forEach(b => {
    const dx = Math.sin(bt*b.driftSpeed + b.phase) * b.driftAmpX + relX * b.parallax;
    const dy = Math.cos(bt*b.driftSpeed*1.3 + b.phase) * b.driftAmpY + relY * b.parallax;
    const scale = 1 + Math.sin(bt*b.driftSpeed*0.8 + b.phase) * b.scaleAmp;
    b.el.style.transform = `translate(${dx}px, ${dy}px) scale(${scale})`;
  });

  requestAnimationFrame(animateBlobs);
}
animateBlobs();

const reactiveLayer = document.getElementById("reactiveLayer");
const REACTIVE_COUNT = 11;
const reactiveParticles = [];
const palette = ["#8b7cf6","#5fa8e8","#c084f5","#6fd0d6","#f5b8e0"];

for(let i=0;i<REACTIVE_COUNT;i++){
  const size = 8 + Math.random()*14;
  const el = document.createElement("div");
  el.className = "reactive";
  el.style.width = size + "px";
  el.style.height = size + "px";
  const color = palette[i % palette.length];
  el.style.background = color;
  el.style.boxShadow = `0 0 ${size*1.6}px ${size*0.4}px ${color}`;
  el.style.opacity = "0.22";
  reactiveLayer.appendChild(el);

  reactiveParticles.push({
    el,
    x: Math.random()*window.innerWidth,
    y: Math.random()*window.innerHeight,
    homeX: Math.random()*window.innerWidth,
    homeY: Math.random()*window.innerHeight,
    speed: 0.035 + Math.random()*0.025,
    fleeRadius: 180 + Math.random()*70,
    wanderPhase: Math.random()*Math.PI*2,
    wanderSpeed: 0.3 + Math.random()*0.3
  });
}

let rt = 0;
function animateReactive(){
  rt += 0.016;
  reactiveParticles.forEach(p => {
    p.homeX += Math.cos(rt*p.wanderSpeed + p.wanderPhase) * 0.3;
    p.homeY += Math.sin(rt*p.wanderSpeed*0.8 + p.wanderPhase) * 0.3;
    p.homeX = Math.max(0, Math.min(window.innerWidth, p.homeX));
    p.homeY = Math.max(0, Math.min(window.innerHeight, p.homeY));

    const dx = mouseX - p.x, dy = mouseY - p.y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 0.001;

    let targetX, targetY;
    if(dist < p.fleeRadius){
      const push = (1 - dist/p.fleeRadius) * 240;
      targetX = p.x - (dx/dist) * push;
      targetY = p.y - (dy/dist) * push;
    } else {
      targetX = p.homeX;
      targetY = p.homeY;
    }

    p.x += (targetX - p.x) * p.speed;
    p.y += (targetY - p.y) * p.speed;
    p.el.style.transform = `translate(${p.x}px, ${p.y}px)`;
  });
  requestAnimationFrame(animateReactive);
}
animateReactive();
</script>
