<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Space+Grotesk:wght@400;500;600&display=swap');

body{background:#0b0b0f;overflow-x:hidden}
#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none}
#app{position:relative;z-index:1;font-family:'Space Grotesk',system-ui;max-width:560px;margin:70px auto;text-align:center;padding:0 24px;color:#eee}
#app h2{font-family:'Fraunces',serif;font-size:40px;margin-bottom:8px;letter-spacing:-1px;background:linear-gradient(135deg,#fff,#999);-webkit-background-clip:text;background-clip:text;color:transparent}
#app p.sub{color:#777;margin-bottom:36px;font-size:14px;letter-spacing:.5px;text-transform:uppercase}
.inputRow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
#word{padding:16px 20px;font-size:16px;width:100%;max-width:300px;border-radius:14px;border:1.5px solid #2a2a33;background:rgba(22,22,29,.8);backdrop-filter:blur(8px);color:#eee;outline:none;transition:.2s}
#word::placeholder{color:#555}
#word:focus{border-color:#666;box-shadow:0 0 0 4px rgba(255,255,255,.05)}
#go{padding:16px 26px;font-size:15px;font-weight:600;border-radius:14px;border:none;background:linear-gradient(135deg,#fff,#ccc);color:#111;cursor:pointer;transition:.2s}
#go:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,255,255,.15)}
#go:disabled{opacity:.4;cursor:default;transform:none}

#box{margin-top:32px;height:220px;border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:26px;font-weight:600;background:rgba(22,22,29,.8);backdrop-filter:blur(8px);border:1px solid #2a2a33;transition:background .5s ease,border-color .5s ease;padding:16px}
#box .hexline{font-family:monospace;font-size:15px;font-weight:500;opacity:.85;margin-top:8px;letter-spacing:1px}
#box .reason{font-size:13px;font-weight:400;opacity:.85;margin-top:12px;line-height:1.5;max-width:380px}
.placeholder{color:#555;font-size:15px;font-weight:400}
</style>

<canvas id="bgCanvas"></canvas>

<div id="app">
<h2>Word → Color</h2>
<p class="sub">type a word, see its color</p>
<div class="inputRow">
<input id="word" placeholder="e.g. nostalgia, ocean, midnight...">
<button id="go">Reveal</button>
</div>
<div id="box"><span class="placeholder">your color will appear here</span></div>
</div>

<script>
async function findColor(word){
  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-6",
      max_tokens:1000,
      messages:[{role:"user",content:`Think about the word "${word}" and the first color that genuinely comes to mind for it. Respond ONLY with this JSON, nothing else: {"hex":"#RRGGBB","name":"color name","reason":"short reason why, one sentence, in english"}`}]
    })
  });
  const data = await res.json();
  const text = data.content.map(c=>c.text||"").join("");
  const clean = text.replace(/```json|```/g,"").trim();
  return JSON.parse(clean);
}

function textColorFor(hex){
  const c = hex.replace("#","");
  const r = parseInt(c.substring(0,2),16);
  const g = parseInt(c.substring(2,4),16);
  const b = parseInt(c.substring(4,6),16);
  const lum = (0.299*r + 0.587*g + 0.114*b)/255;
  return lum > 0.55 ? "#111" : "#fff";
}

const btn = document.getElementById("go");
const input = document.getElementById("word");
const box = document.getElementById("box");

async function run(){
  const word = input.value.trim();
  if(!word) return;
  btn.disabled = true;
  box.style.background = "rgba(22,22,29,.8)";
  box.style.borderColor = "#2a2a33";
  box.innerHTML = '<span class="placeholder">thinking...</span>';
  try{
    const r = await findColor(word);
    const tc = textColorFor(r.hex);
    box.style.background = r.hex;
    box.style.borderColor = r.hex;
    box.style.color = tc;
    box.innerHTML = r.name + '<div class="hexline">' + r.hex.toUpperCase() + '</div><div class="reason">' + r.reason + '</div>';
  }catch(e){
    box.style.background = "rgba(22,22,29,.8)";
    box.innerHTML = '<span class="placeholder" style="color:#e66">error, try again</span>';
  }
  btn.disabled = false;
}

btn.onclick = run;
input.addEventListener("keydown", e => { if(e.key === "Enter") run(); });

const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");
let w, h;
function resize(){ w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
resize();
window.addEventListener("resize", resize);

const mouse = { x: w/2, y: h/2 };
document.addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });

const COUNT = 80;
const particles = Array.from({length: COUNT}, () => ({
  x: Math.random()*w,
  y: Math.random()*h,
  vx: (Math.random()-0.5)*0.4,
  vy: (Math.random()-0.5)*0.4
}));

function tick(){
  ctx.clearRect(0,0,w,h);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if(p.x < 0 || p.x > w) p.vx *= -1;
    if(p.y < 0 || p.y > h) p.vy *= -1;
    const dx = mouse.x - p.x, dy = mouse.y - p.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if(dist < 160){
      p.x -= dx*0.01;
      p.y -= dy*0.01;
    }
  });

  for(let i=0;i<COUNT;i++){
    for(let j=i+1;j<COUNT;j++){
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if(dist < 130){
        ctx.strokeStyle = `rgba(150,150,180,${(1 - dist/130)*0.25})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }

  particles.forEach(p => {
    ctx.fillStyle = "rgba(200,200,220,0.6)";
    ctx.beginPath();
    ctx.arc(p.x, p.y, 1.8, 0, Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(tick);
}
tick();
</script>
